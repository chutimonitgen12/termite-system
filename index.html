<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตารางฉีดปลวก</title>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <style>
        :root { --bg: #1a1a1a; --card-bg: #262626; --accent: #d4af37; --text: #ffffff; }
        body { font-family: 'Kanit', sans-serif; background: var(--bg); color: var(--text); padding: 15px; margin: 0; padding-bottom: 80px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: var(--card-bg); border-radius: 16px; padding: 20px; margin-bottom: 20px; border: 1px solid #444; }
        
        /* ปุ่มเพิ่มรายการ ย้ายมาด้านล่าง */
        .btn-add { background: var(--accent); color: #000; width: 100%; padding: 18px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        
        .img-box { width: 60px; height: 60px; border: 2px solid var(--accent); border-radius: 50%; background-size: cover; display: flex; align-items: center; justify-content: center; cursor: pointer; background-color: #333; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .item { padding: 10px; background: #333; border-radius: 10px; text-align: center; }
        input[type="date"] { background: #444; color: white; border: none; width: 100%; border-radius: 4px; padding: 5px; }
        input[type="date"]:not([value=""]) { background: var(--accent); color: black; font-weight: bold; }
        .status-select { background: #555; color: white; border: none; width: 100%; margin-top: 5px; border-radius: 4px; }
        #photoModal { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--accent);">👑 ตารางสรุปงานฉีดปลวก</h2>
    <div id="cardContainer"></div>
    <button class="btn-add" onclick="addRow()">➕ เพิ่มลูกค้าใหม่</button>
</div>

<div id="photoModal" onclick="this.style.display='none'">
    <img id="modalImg" style="max-width:90%; border: 3px solid var(--accent);">
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBVtu1ISM_BDv2QcUK5yysusJKwizUhoZE",
        databaseURL: "https://termite-spray-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "termite-spray"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('termiteSystem/customers').on('value', (snap) => {
        const container = document.getElementById('cardContainer');
        container.innerHTML = '';
        const data = snap.val() || {};
        Object.keys(data).forEach((id, index) => {
            const row = data[id];
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
                <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
                    <div style="background:var(--accent); color:#000; width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">${index + 1}</div>
                    <input type="text" style="flex:1; background:transparent; border:none; color:white; font-size:16px; font-weight:bold;" value="${row.locationDetails || ''}" placeholder="ชื่อโครงการ..." onchange="update('${id}', 'locationDetails', this.value)">
                    <button onclick="deleteRow('${id}')">🗑️</button>
                </div>
                <div style="display:flex; align-items:center; gap:15px;">
                    <div class="img-box" style="background-image: url('${row.photoData || ''}')" onclick="openModal('${row.photoData || ''}')">📷</div>
                    <label style="background:var(--accent); color:black; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:12px;">เปลี่ยนรูป<input type="file" style="display:none" accept="image/*" onchange="uploadImg(event, '${id}')"></label>
                </div>
                <div class="grid" id="grid-${id}"></div>
            `;
            container.appendChild(card);
            const grid = document.getElementById(`grid-${id}`);
            for(let i=0; i<6; i++) {
                grid.innerHTML += `
                    <div class="item">
                        <input type="date" value="${(row.dates && row.dates[i]) || ''}" onchange="updateVisit('${id}', ${i}, this.value)">
                        <select class="status-select" onchange="updateStatus('${id}', ${i}, this.value)">
                            <option value="pending" ${row.statuses && row.statuses[i] == 'pending' ? 'selected' : ''}>⏳ รอ</option>
                            <option value="done" ${row.statuses && row.statuses[i] == 'done' ? 'selected' : ''}>✅ เข้า</option>
                        </select>
                    </div>`;
            }
        });
    });

    function uploadImg(e, id) { const file = e.target.files[0]; const reader = new FileReader(); reader.onloadend = () => db.ref(`termiteSystem/customers/${id}/photoData`).set(reader.result); reader.readAsDataURL(file); }
    function openModal(src) { if(src) { document.getElementById('modalImg').src = src; document.getElementById('photoModal').style.display = 'flex'; } }
    function update(id, f, v) { db.ref(`termiteSystem/customers/${id}`).update({[f]: v}); }
    function updateVisit(id, i, v) { db.ref(`termiteSystem/customers/${id}/dates/${i}`).set(v); }
    function updateStatus(id, i, v) { db.ref(`termiteSystem/customers/${id}/statuses/${i}`).set(v); }
    function deleteRow(id) { if(confirm('ลบรายการนี้?')) db.ref(`termiteSystem/customers/${id}`).remove(); }
    function addRow() { db.ref('termiteSystem/customers').push({locationDetails: '', dates: Array(6).fill(''), statuses: Array(6).fill('pending')}); }
</script>
</body>
</html>
